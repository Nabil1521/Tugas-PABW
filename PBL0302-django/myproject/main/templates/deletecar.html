{% extends 'base.html' %} {% block content %}

<div class="animate-fade-in max-w-2xl mx-auto px-6">
  <div class="mb-8 mt-8">
    <h2 class="text-3xl font-display font-bold text-red-400 mb-2">
      Hapus Data Mobil
    </h2>
    <p class="text-white/60">Tindakan ini tidak dapat dibatalkan</p>
  </div>

  <div
    class="bg-gradient-to-br from-red-900/20 to-red-950/20 border border-red-500/30 rounded-2xl p-8 backdrop-blur-sm">
    <form method="POST" action="{% url 'delete' car.id %}">
      {% csrf_token %}

      <div class="bg-red-900/30 border border-red-500/50 rounded-lg p-6 mb-8">
        <p class="text-white/90">
          Yakin ingin menghapus mobil:
          <span class="text-red-300 font-bold text-lg">{{ car.carname }}</span>
          ?
        </p>
        <p class="text-white/60 text-sm mt-2">
          Brand: <span class="text-white">{{ car.carbrand }}</span> | Model:
          <span class="text-white">{{ car.carmodel }}</span> | Harga:
          <span class="text-white">Rp{{ car.carprice }}</span>
        </p>
      </div>

      <div class="flex gap-3">
        <button
          type="submit"
          class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-3 rounded-xl transition-all shadow-lg shadow-red-600/20 hover:shadow-lg hover:shadow-red-600/40 flex items-center justify-center gap-2">
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Hapus Permanen
        </button>

        <a
          href="{% url 'read' %}"
          class="flex-1 bg-navy-800 hover:bg-navy-700 text-white font-semibold px-6 py-3 rounded-xl transition-all flex items-center justify-center gap-2">
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12" />
          </svg>
          Batal
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
