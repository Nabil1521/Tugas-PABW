<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CarVault{% endblock %} | Car Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                50: "#eef2ff",
                100: "#dde6ff",
                200: "#c0ccff",
                300: "#94a8ff",
                400: "#6b80ff",
                500: "#4a5bff",
                600: "#2e3ff7",
                700: "#1e2de3",
                800: "#1724b8",
                900: "#0f1675",
                950: "#080c4a",
              },
            },
            fontFamily: {
              display: ['"Syne"', "sans-serif"],
              body: ['"DM Sans"', "sans-serif"],
              mono: ['"JetBrains Mono"', "monospace"],
            },
            animation: {
              "fade-in": "fadeIn 0.5s ease forwards",
              "slide-up": "slideUp 0.5s ease forwards",
              "pulse-slow": "pulse 3s ease-in-out infinite",
            },
            keyframes: {
              fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
              slideUp: {
                from: { opacity: 0, transform: "translateY(20px)" },
                to: { opacity: 1, transform: "translateY(0)" },
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet" />
    <style>
      body {
        font-family: "DM Sans", sans-serif;
      }
      h1,
      h2,
      h3,
      .font-display {
        font-family: "Syne", sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .nav-link {
        position: relative;
        transition: color 0.2s;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 2px;
        background: #4a5bff;
        transition: width 0.25s;
      }
      .nav-link:hover::after,
      .nav-link.active::after {
        width: 100%;
      }
      .btn-primary {
        background: linear-gradient(135deg, #1e2de3 0%, #4a5bff 100%);
        transition: all 0.2s;
        box-shadow: 0 4px 20px rgba(74, 91, 255, 0.35);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(74, 91, 255, 0.5);
      }
      .card-shine {
        position: relative;
        overflow: hidden;
      }
      .card-shine::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -60%;
        width: 50%;
        height: 200%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.04),
          transparent
        );
        transform: skewX(-20deg);
        transition: left 0.5s;
      }
      .card-shine:hover::before {
        left: 120%;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(74, 91, 255, 0.4);
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #080c4a;
      }
      ::-webkit-scrollbar-thumb {
        background: #2e3ff7;
        border-radius: 3px;
      }
      .stagger-1 {
        animation-delay: 0.05s;
      }
      .stagger-2 {
        animation-delay: 0.1s;
      }
      .stagger-3 {
        animation-delay: 0.15s;
      }
      .stagger-4 {
        animation-delay: 0.2s;
      }
    </style>
  </head>
  <body class="bg-navy-950 text-white min-h-screen flex flex-col">
    <!-- Background decoration -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
      <div
        class="absolute -top-40 -right-40 w-96 h-96 bg-navy-600 rounded-full opacity-10 blur-3xl animate-pulse-slow"></div>
      <div
        class="absolute top-1/2 -left-32 w-80 h-80 bg-blue-600 rounded-full opacity-10 blur-3xl animate-pulse-slow"
        style="animation-delay: 1.5s"></div>
      <div
        class="absolute bottom-0 right-1/3 w-72 h-72 bg-indigo-700 rounded-full opacity-10 blur-3xl animate-pulse-slow"
        style="animation-delay: 3s"></div>
      <!-- Grid pattern -->
      <div
        class="absolute inset-0 opacity-5"
        style="
          background-image:
            linear-gradient(rgba(74, 91, 255, 0.3) 1px, transparent 1px),
            linear-gradient(90deg, rgba(74, 91, 255, 0.3) 1px, transparent 1px);
          background-size: 40px 40px;
        "></div>
    </div>

    <!-- NAVBAR -->
    <nav
      class="relative z-20 border-b border-white/10 bg-navy-950/80 backdrop-blur-xl sticky top-0">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <!-- Logo -->
        <a href="{% url 'read' %}" class="flex items-center gap-3 group">
          <div
            class="w-10 h-10 rounded-xl bg-gradient-to-br from-navy-500 to-blue-600 flex items-center justify-center shadow-lg shadow-blue-900/40 group-hover:scale-105 transition-transform">
            <svg
              class="w-6 h-6 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7-4-7 4m14 0v6a2 2 0 01-1 1.73l-6 3.46a2 2 0 01-2 0L5 16.73A2 2 0 014 15V9m7 10v-6m7-4l-7 4-7-4" />
            </svg>
          </div>
          <span class="font-display font-700 text-xl tracking-tight"
            >Car<span class="text-navy-400">Vault</span></span
          >
        </a>

        <!-- Nav links -->
        <div class="hidden md:flex items-center gap-8">
          <a
            href="{% url 'read' %}"
            class="nav-link text-sm font-medium text-white/70 hover:text-white {% if request.resolver_match.url_name == 'read' %}active text-white{% endif %}"
            >Koleksi</a
          >
          <a
            href="{% url 'search' %}"
            class="nav-link text-sm font-medium text-white/70 hover:text-white {% if request.resolver_match.url_name == 'search' %}active text-white{% endif %}"
            >Cari</a
          >
          <a
            href="{% url 'settings' %}"
            class="nav-link text-sm font-medium text-white/70 hover:text-white {% if request.resolver_match.url_name == 'settings' %}active text-white{% endif %}"
            >Pengaturan</a
          >
        </div>

        <!-- CTA -->
        <a
          href="{% url 'create' %}"
          class="btn-primary text-sm font-semibold px-5 py-2.5 rounded-xl text-white flex items-center gap-2">
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4" />
          </svg>
          Tambah Mobil
        </a>
      </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="relative z-10 max-w-7xl mx-auto w-full px-6 pt-4">
      {% for message in messages %}
      <div
        class="mb-3 px-5 py-3.5 rounded-xl flex items-center gap-3 animate-slide-up {% if message.tags == 'success' %}bg-emerald-500/10 border border-emerald-500/30 text-emerald-300 {% elif message.tags == 'error' %}bg-red-500/10 border border-red-500/30 text-red-300 {% else %}bg-navy-700/50 border border-navy-600/50 text-white/80{% endif %}">
        {% if message.tags == 'success' %}
        <svg
          class="w-5 h-5 flex-shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {% else %}
        <svg
          class="w-5 h-5 flex-shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {% endif %}
        <span class="text-sm font-medium">{{ message }}</span>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Content -->
    <main class="relative z-10 flex-1">{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer
      class="relative z-10 border-t border-white/10 bg-navy-950/60 backdrop-blur-xl mt-auto">
      <div
        class="max-w-7xl mx-auto px-6 py-6 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2 text-white/40 text-sm">
          <span class="font-display font-semibold text-white/60">CarVault</span>
          <span>·</span>
          <span>Sistem Manajemen Data Kendaraan</span>
        </div>
        <div class="text-white/30 text-sm font-mono">
          Django + SQLite + TailwindCSS
        </div>
      </div>
    </footer>
  </body>
</html>
