<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{appType}} | Car Project</title>

    <!-- Bootstrap -->
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="row">
        <div class="col-md-12">
            <h1>{{appType}} | Car Project</h1>
            <h5>
                <a href="{{url_for('createcar')}}">Create</a> /
                <a href="{{url_for('readcar')}}">Read</a> /
                <a href="{{url_for('searchcar')}}">Search</a>
            </h5>
        </div>
    </div>

    <hr>

    <!-- SEARCH FORM -->
    <div class="row">
        <div class="col-md-6">
            <h4>Search Car Data</h4>

            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="keyword" class="form-control" placeholder="Masukkan nama mobil...">
                </div>

                <button type="submit" class="btn btn-primary">Cari</button>
            </form>
        </div>
    </div>

    <br>

    <!-- RESULT -->
    {% if results %}
    <div class="row">
        <div class="col-md-12">
            <h5>Hasil Pencarian:</h5>

            <table class="table table-bordered">
                <tr>
                    <th>Nama</th>
                    <th>Brand</th>
                    <th>Model</th>
                    <th>Harga</th>
                </tr>

                {% for car in results %}
                <tr>
                    <td>{{car.carname}}</td>
                    <td>{{car.carbrand}}</td>
                    <td>{{car.carmodel}}</td>
                    <td>{{car.carprice}}</td>
                </tr>
                {% endfor %}

            </table>
        </div>
    </div>
    {% endif %}

</div>

<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
