{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Microservice {{servermana}} | Car Project</title>

    <meta name="description" content="Source code generated using layoutit.com">
    <meta name="author" content="LayoutIt!">

    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

  </head>
  <body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <h1>Microservice {{servermana}} | Car Project</h1>
                <h3>Demo:
                        <a href="{% url 'createcar' ms=servermana %}">Create</a>
                        /
                        <a href="{% url 'readcar' ms=servermana %}">Read</a>
                        /
                        <a href="{% url 'updatecar' ms=servermana %}">Update</a>
                        /
                        <a href="{% url 'deletecar' ms=servermana %}">Delete</a>
                        /
                        <a href="{% url 'searchcar' ms=servermana %}">Search</a>
                </h3> 
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-md-12">
                <h4>Edit Car #{{car.id}} — {{servermana}} ({{DB}})</h4>
                <form role="form" action="{% url 'updatecarsave' ms=servermana car_id=car.id %}" method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="isianName">
                            Name 
                        </label>
                        <input type="text" class="form-control" id="isianName" name="carName" value="{{car.carname}}">
                    </div>

                    <div class="form-group">
                    <label for="isianBrand">
                         Brand
                        </label>
                        <input type="text" class="form-control" id="isianBrand" name="carBrand" value="{{car.carbrand}}">
                    </div>

                    <div class="form-group">
                        <label for="isianModel">
                            Model
                        </label>
                        <input type="text" class="form-control" id="isianModel" name="carModel" value="{{car.carmodel}}">
                    </div>

                    <div class="form-group">
                        <label for="isianPrice">
                            Price
                        </label>
                        <input type="text" class="form-control" id="isianPrice" name="carPrice" value="{{car.carprice}}">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Update
                    </button>
                    <a href="{% url 'updatecar' ms=servermana %}" class="btn btn-default">Cancel</a>
                </form>
            </div>
            
        </div>
    </div>

    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/scripts.js' %}"></script>
  </body>
</html>
